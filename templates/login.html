<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Student Result Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Source Sans 3', sans-serif;
            background: linear-gradient(rgba(26, 37, 72, 0.7), rgba(15, 23, 41, 0.7)), url('/static/images/college-building-bg.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .login-wrap {
            width: 100%;
            max-width: 1000px;
            padding: 1rem;
            position: relative;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
            color: white;
        }

        .brand-icon-lg {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            border: 2px solid var(--accent2, #a78bfa);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
            box-shadow: 0 8px 24px rgba(139,92,246,0.3);
        }

        .brand-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.4rem;
            color: white;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .brand-sub {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .login-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 1.5rem;
        }
/* 
        .login-card {
            background: rgb(131, 129, 129);
            border-radius: 12px;
            padding: 2.2rem;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
            border: 2px solid transparent;
            transition: all 0.3s ease;
        } */
     .login-card {
    background: rgba(255, 255, 255, 0.599);
    border-radius: 12px;
    padding: 2.2rem;
    box-shadow: 
        0 24px 64px rgba(0, 0, 0, 0.35),
        0 1px 0 rgba(255, 255, 255, 0.15) inset,
        0 -1px 0 rgba(0, 0, 0, 0.1) inset;
    border: 1.5px solid rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    transition: all 0.3s ease;
    color:whitesmoke;
}

        .login-card:hover {
            border-color: rgba(139,92,246,0.3);
            transform: translateY(-4px);
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }

        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 0.8rem;
        }

        .login-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem;
            color: #1a2548;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-sub {
            font-size: 0.9rem;
            color: #64748b;
            margin-bottom: 1.6rem;
        }

        .form-group { margin-bottom: 1.4rem; }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #1a2548;
            margin-bottom: 0.5rem;
        }

        input[type=text], input[type=password] {
            width: 100%;
            padding: 0.85rem 1.1rem;
            border: 1.5px solid #e1e8f0;
            border-radius: 7px;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.95rem;
            color: #1a2548;
            transition: all 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #8b5cf6;
            box-shadow: 0 0 0 4px rgba(139,92,246,0.1);
        }

        .form-hint {
            font-size: 0.75rem;
            color: #9ca3af;
            margin-top: 0.3rem;
        }

        .btn-login {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
            color: white;
            font-family: 'Source Sans 3', sans-serif;
            font-size: 0.96rem;
            font-weight: 700;
            border: none;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.6rem;
            letter-spacing: 0.02em;
            box-shadow: 0 4px 12px rgba(139,92,246,0.2);
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(139,92,246,0.4);
        }

        .flash {
            background: #fee2e2;
            border: 1px solid #fda29b;
            border-left: 4px solid #ef4444;
            border-radius: 8px;
            padding: 1rem 1.2rem;
            color: #991b1b;
            font-size: 0.9rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            box-shadow: 0 2px 8px rgba(239,68,68,0.1);
        }

        .login-footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.75rem;
        }

        @media (max-width: 768px) {
            .login-container {
                grid-template-columns: 1fr;
            }
            .brand-title {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

<div class="login-wrap">
    <div class="login-header">
        
        <div class="brand-title">Welcome Back</div>
        <!-- <div class="brand-sub">Access your academic results with ease</div> -->
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for cat, msg in messages %}
        <div style="margin-bottom: 1.5rem;">
            <div class="flash">{{ msg }}</div>
        </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="login-container">
        <!-- ADMIN LOGIN -->
        <div class="login-card">
            <!-- <div class="card-icon">🧑‍💼</div> -->
            <div class="login-title">Admin Login</div>

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="login_type" value="admin">

                <div class="form-group">
                    <label for="admin_username">Username</label>
                    <input type="text" id="admin_username" name="admin_username"
                           placeholder="Enter admin username"
                           autocomplete="username" required>
                    <!-- <div class="form-hint">Default: admin</div> -->
                </div>

                <div class="form-group">
                    <label for="admin_password">Password</label>
                    <input type="password" id="admin_password" name="admin_password"
                           placeholder="Enter admin password"
                           autocomplete="current-password" required>
                    <!-- <div class="form-hint">Default: admin123</div> -->
                </div>

                <button type="submit" class="btn-login">Login as Admin</button>
            </form>
            <p style="text-align: center; margin-top: 1rem; font-size: 0.9rem; color: #64748b;">
                Don't have an account? <a href="{{ url_for('admin_register') }}" style="color: #8b5cf6; text-decoration: none; font-weight: 600;">Register here</a>
            </p>
        </div>

        <!-- STUDENT LOGIN -->
        <div class="login-card">
            <!-- <div class="card-icon"></div> -->
            <div class="login-title">Student Login</div>
            <!-- <div class="login-sub">View your result and academic performance</div> -->

            <form method="POST" action="{{ url_for('login') }}">
                <input type="hidden" name="login_type" value="student">

                <div class="form-group">
                    <label for="student_roll">Roll Number</label>
                    <input type="text" id="student_roll" name="student_roll"
                           autocomplete="username" required placeholder="Enter your roll number">
                </div>

                <div style="height: 66px;"></div>

                <button type="submit" class="btn-login">Login as Student</button>
            </form>
        </div>
    </div>

  
</div>

</body>
</html>
